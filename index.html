<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>عيد ميلاد أميرتي نور</title>
    <style>
        /* إعدادات عامة */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body, html {
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #000; /* الظلام في البداية */
            display: flex;
            justify-content: center;
            align-items: center;
            transition: background-color 1.5s ease;
        }

        /* شاشة الظلام والزر الأول */
        #dark-screen {
            position: absolute;
            z-index: 10;
            display: flex;
            justify-content: center;
            align-items: center;
            width: 100%;
            height: 100%;
        }

        .btn {
            padding: 15px 30px;
            font-size: 1.2rem;
            font-weight: bold;
            color: #fff;
            background: linear-gradient(45deg, #ff4b2b, #ff416c);
            border: none;
            border-radius: 50px;
            cursor: pointer;
            box-shadow: 0 5px 15px rgba(255, 75, 43, 0.4);
            transition: transform 0.2s, cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .btn:hover {
            transform: scale(1.05);
        }

        .btn-light {
            background: linear-gradient(45deg, #f1c40f, #f39c12);
            box-shadow: 0 5px 20px rgba(241, 196, 15, 0.6);
            color: #000;
        }

        /* المحتوى بعد تشغيل الضوء */
        #main-content {
            display: none;
            text-align: center;
            flex-direction: column;
            align-items: center;
            z-index: 5;
            width: 90%;
            max-width: 600px;
        }

        .welcome-text {
            font-size: 2.5rem;
            color: #2c3e50;
            margin-bottom: 30px;
            opacity: 0;
            transform: translateY(-20px);
            animation: fadeInDown 1s forwards 0.5s;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.1);
        }

        /* الورقة الوردية */
        #gift-card {
            display: none;
            background-color: #fff0f5; /* وردي فاتح ناعم */
            border: 3px dashed #ffb6c1;
            border-radius: 20px;
            padding: 30px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.15);
            margin-top: 20px;
            position: relative;
            animation: scaleUp 0.5s forwards;
            max-height: 70vh;
            overflow-y: auto;
        }

        .letter-content {
            font-size: 1.3rem;
            line-height: 1.8;
            color: #bdc3c7; /* لون رمادي خفيف جداً يتبدل بالأحمر كلمة كلمة */
            text-align: right;
            margin-bottom: 25px;
            word-wrap: break-word;
        }

        /* الكلمات المكتوبة تظهر باللون الأحمر */
        .word-appear {
            color: #d63031;
            animation: wordPop 0.3s forwards;
            display: inline-block;
            margin-left: 5px;
        }

        .signature {
            font-size: 1.5rem;
            font-weight: bold;
            color: #d63031;
            margin-top: 20px;
            display: none;
            animation: fadeIn 1s forwards;
        }

        /* العناصر الطائرة (قلوب وورود) */
        .falling-element {
            position: absolute;
            bottom: -50px;
            font-size: 1.5rem;
            pointer-events: none;
            animation: floatUp linear forwards;
            z-index: 1;
        }

        /* تأثيرات الحركة (Animations) */
        @keyframes fadeInDown {
            to { opacity: 1; transform: translateY(0); }
        }
        @keyframes fadeIn {
            to { opacity: 1; }
        }
        @keyframes scaleUp {
            from { transform: scale(0.8); opacity: 0; }
            to { transform: scale(1); opacity: 1; }
        }
        @keyframes wordPop {
            from { transform: scale(0.8); opacity: 0; }
            to { transform: scale(1); opacity: 1; }
        }
        @keyframes floatUp {
            0% {
                transform: translateY(0) rotate(0deg);
                opacity: 1;
            }
            100% {
                transform: translateY(-105vh) rotate(360deg);
                opacity: 0;
            }
        }
    </style>
</head>
<body>

    <!-- المرحلة الأولى: الظلام والزر -->
    <div id="dark-screen">
        <button class="btn btn-light" onclick="turnOnLight()">تشغيل اللمبه 💡</button>
    </div>

    <!-- المحتوى الرئيسي للموقع -->
    <div id="main-content">
        <h1 class="welcome-text">أهلاً بالأميرة نور ✨👑</h1>
        
        <button id="gift-btn" class="btn" onclick="openGift()">حسين دز الج هدية من موقع سكون 🎁</button>

        <!-- الورقة الوردية -->
        <div id="gift-card">
            <div class="letter-content" id="letter"></div>
            <div class="signature" id="signature">حسين ❤️ أميرته نور</div>
        </div>
    </div>

    <script>
        // المعايدة الطويلة (تم صياغتها لتكون دافئة ومناسبة لطلبك)
        const longMessage = "في هذا اليوم السعيد والمميز نورت وزهرت الدنيا حبيبتي نور.. كل عام وأنتِ بألف خير يا أجمل وأرق أميرة في الكون.. اليوم ليس مجرد يوم ميلاد عادي بل هو اليوم الذي أشرقت فيه حياتي بوجودكِ معي.. أتمنى لكِ عاماً مليئاً بالفرح والسعادة والنجاح.. وأن تبقي دائماً بجانبي تملئين دنيتي بابتسامتكِ الساحرة التي تذهب كل همومي.. أحبكِ اليوم وأحبكِ غداً وأحبكِ لآخر العمر يا كل دنيتي ونوري.";

        // تشغيل الضوء
        function turnOnLight() {
            document.body.style.backgroundColor = "#fff5f5"; // تغيير الخلفية لوردي هادئ جداً يدل على الإضاءة والبهجة
            document.getElementById('dark-screen').style.display = 'none';
            document.getElementById('main-content').style.display = 'flex';
        }

        // فتح الهدية
        function openGift() {
            document.getElementById('gift-btn').style.display = 'none';
            document.getElementById('gift-card').style.display = 'block';
            
            // بدء إطلاق القلوب والورود
            startFloatingElements();
            
            // بدء طباعة المعايدة كلمة كلمة
            startTypingEffect();
        }

        // تأثير طباعة الكلمات كلمة كلمة
        function startTypingEffect() {
            const letterElement = document.getElementById('letter');
            const words = longMessage.split(' ');
            let wordIndex = 0;

            function addWord() {
                if (wordIndex < words.length) {
                    let span = document.createElement('span');
                    span.innerText = words[wordIndex];
                    span.className = 'word-appear';
                    letterElement.appendChild(span);
                    wordIndex++;
                    // سرعة ظهور الكلمات (300 ملي ثانية بين كل كلمة وكلمة)
                    setTimeout(addWord, 300);
                } else {
                    // بعد انتهاء النص تظهر التوقيع
                    document.getElementById('signature').style.display = 'block';
                }
            }
            addWord();
        }

        // توليد قلوب وورود تطير في الشاشة
        function startFloatingElements() {
            const items = ['❤️', '💖', '🌹', '🌸', '✨', '💕'];
            
            setInterval(() => {
                const element = document.createElement('div');
                element.className = 'falling-element';
                // اختيار رمز عشوائي من المصفوفة
                element.innerText = items[Math.floor(Math.random() * items.length)];
                
                // تحديد مكان عشوائي للظهور على عرض الشاشة
                element.style.left = Math.random() * 100 + 'vw';
                
                // تحديد حجم عشوائي للعنصر الطائر
                element.style.fontSize = (Math.random() * 20 + 20) + 'px';
                
                // تحديد سرعة عشوائية للصعود (بين 3 إلى 6 ثوانٍ)
                element.style.animationDuration = (Math.random() * 3 + 3) + 's';
                
                document.body.appendChild(element);
                
                // حذف العنصر من الكود بعد انتهاء الحركة للحفاظ على أداء المتصفح
                setTimeout(() => {
                    element.remove();
                }, 6000);
            }, 150); // يطلق عنصراً جديداً كل 150 ملي ثانية
        }
    </script>
</body>
</html>
